Section "InputClass"
    Identifier "mouse catchall"
    Driver "libinput"
    MatchIsPointer "on"
    MatchDevicePath "/dev/input/event*"
    Option "AccelProfile" "flat"
    Option "AccelSpeed" "1"
EndSection

Section "InputClass"
	Identifier "touchpad catchall"
	Driver "libinput"
	MatchIsTouchpad "on"
	MatchDevicePath "/dev/input/event*"
	Option "AccelProfile" "flat"
	Option "AccelSpeed" "1"
	Option "ClickMethod" "clickfinger"
	Option "HorizTwoFingerScroll" "1"
	Option "Tapping" "on"
	Option "TapButton2" "3"
	Option "TapButton3" "2"
EndSection
